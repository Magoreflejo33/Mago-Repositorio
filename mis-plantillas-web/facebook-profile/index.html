<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .banner { height: 300px; background: url('video-banner.mp4') no-repeat center center; background-size: cover; }
        .profile-info { padding: 20px; background: #fff; display: flex; }
        .profile-info img { width: 120px; height: 120px; border-radius: 50%; margin-right: 20px; }
        .posts { padding: 20px; }
        .post { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin-bottom: 10px; }
        .comments { margin-top: 10px; }
        .reactions { display: flex; gap: 10px; }
        .reaction { cursor: pointer; }
    </style>
</head>
<body>
    <div class="banner">
        <video autoplay muted loop>
            <source src="video-banner.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="profile-info">
        <img src="profile-pic.jpg" alt="Profile Picture">
        <div>
            <h1>John Doe</h1>
            <p>Software Developer</p>
            <p>Location: Somewhere</p>
        </div>
    </div>
    <div class="posts">
        <div class="post">
            <h2>Post Title</h2>
            <p>This is a post content.</p>
            <div class="reactions">
                <span class="reaction">👍</span>
                <span class="reaction">❤️</span>
                <span class="reaction">😮</span>
            </div>
            <div class="comments">
                <h3>Comments</h3>
                <div class="comment">
                    <strong>User1:</strong> Great post!
                </div>
                <div class="comment">
                    <strong>User2:</strong> Thanks for sharing.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
